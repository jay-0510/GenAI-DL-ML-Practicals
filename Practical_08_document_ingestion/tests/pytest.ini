[pytest]
; This file lives INSIDE tests/ (matching the given project structure),
; which makes tests/ itself pytest's "rootdir" when this config is
; discovered -- so pythonpath is set to ".." (one level up) to reach the
; actual project root where src/ and utils/ live, NOT "." (which would
; only add tests/ itself, breaking `from src... import`).
;
; IMPORTANT: pytest only discovers an ini file by searching UPWARD from
; the path(s) you give it. Run tests with `pytest tests/` (passing this
; folder explicitly) from the project root -- a bare `pytest` with no
; arguments will NOT find this file and imports will fail. See README.
pythonpath = ..
